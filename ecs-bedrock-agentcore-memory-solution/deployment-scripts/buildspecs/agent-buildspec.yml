version: 0.2
phases:
  pre_build:
    commands:
      - echo Logging in to ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $(echo $ECR_REPO | cut -d/ -f1)
      - IMAGE_TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION:-$(date +%Y%m%d%H%M%S)}
  build:
    commands:
      - echo Building agent container...
      - cd kiro-agentcore-runtime-with-memory
      - docker build --pull --no-cache -t $ECR_REPO:latest .
      - docker tag $ECR_REPO:latest $ECR_REPO:$IMAGE_TAG
  post_build:
    commands:
      - echo Pushing to ECR...
      - docker push $ECR_REPO:latest
      - docker push $ECR_REPO:$IMAGE_TAG
      - echo "Starting ECR image scan..."
      - aws ecr start-image-scan --repository-name $(echo $ECR_REPO | awk -F/ '{print $NF}') --image-id imageTag=$IMAGE_TAG --region $AWS_DEFAULT_REGION || true
